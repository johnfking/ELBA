name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Lua and LuaRocks
      run: |
        sudo apt-get update
        sudo apt-get install -y luajit luarocks
    
    - name: Install busted
      run: |
        sudo luarocks install busted
        sudo luarocks install luacov
    
    - name: Add LuaRocks to PATH
      run: echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
    
    - name: Run tests
      env:
        LUABOTS_STUB_MQ: 1
      run: busted -v spec --coverage
    
    - name: Generate coverage report
      run: luacov
    
    - name: Verify 100% coverage
      run: |
        if ! grep -q "Total.*100.00%" luacov.report.out; then
          echo "Error: Coverage is not 100%"
          tail -20 luacov.report.out
          exit 1
        fi
        echo "Coverage: 100% ✓"

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        draft: false
        prerelease: false
